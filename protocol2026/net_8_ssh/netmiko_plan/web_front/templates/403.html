{% extends "base.html" %}

{% block title %}访问被拒绝 - 亁颐堂NetDevOps管理平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="error-page">
            <h1 class="display-1 text-muted">403</h1>
            <h2 class="mb-4">访问被拒绝</h2>
            <p class="lead text-muted mb-4">抱歉，您没有权限访问此页面。</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="fa-solid fa-home me-2"></i>返回首页
                </a>
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>重新登录
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
