services:
  qyt-influx:
    image: "influxdb:1.8.5"
    user: root
    environment:
      - INFLUXDB_DB=qytdb
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=Cisc0123
      - INFLUXDB_USER=qytdbuser
      - INFLUXDB_USER_PASSWORD=Cisc0123
    ports:
      - "8086:8086"
    networks:
      - qyt_net
    restart: always

  qyt-grafana:
    image: "grafana/grafana:7.5.11"
    user: root
    ports:
      - "3000:3000"
    depends_on:
      - "qyt-influx"
    networks:
      - qyt_net
    restart: always

networks:
  qyt_net:
    driver: bridge
